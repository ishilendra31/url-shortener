<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snip — URL Shortener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #6c63ff;
      --accent2: #ff6b6b;
      --text: #f0f0ff;
      --muted: #7070a0;
      --success: #4ade80;
      --mono: 'DM Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 0;
    }

    /* HEADER */
    header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo span { color: var(--accent2); -webkit-text-fill-color: var(--accent2); }

    .tagline {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* HERO / INPUT SECTION */
    .hero {
      max-width: 760px;
      margin: 0 auto;
      padding: 4rem 2rem 2rem;
    }

    .hero-title {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -2px;
      margin-bottom: 0.5rem;
    }

    .hero-title .highlight {
      background: linear-gradient(135deg, var(--accent), #a78bfa, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-sub {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.875rem;
      margin-bottom: 2.5rem;
    }

    /* FORM */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
    }

    .input-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .url-input {
      flex: 1;
      min-width: 200px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.875rem;
      padding: 0.875rem 1rem;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
    }

    .url-input:focus { border-color: var(--accent); }
    .url-input::placeholder { color: var(--muted); }

    .shorten-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.875rem 1.75rem;
      border-radius: 10px;
      font-family: var(--sans);
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .shorten-btn:hover { opacity: 0.85; }
    .shorten-btn:active { transform: scale(0.97); }

    .options-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .opt-label {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .alias-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.8rem;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
      width: 160px;
    }

    .alias-input:focus { border-color: var(--accent); }
    .alias-input::placeholder { color: var(--muted); }

    /* RESULT */
    .result-box {
      margin-top: 1.25rem;
      background: var(--surface2);
      border: 1px solid var(--success);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .result-box.show { display: flex; }

    .result-short {
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--success);
      font-weight: 500;
    }

    .result-actions { display: flex; gap: 0.5rem; }

    .icon-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.45rem 0.85rem;
      border-radius: 7px;
      font-size: 0.78rem;
      font-family: var(--mono);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .icon-btn:hover { border-color: var(--accent); background: var(--surface2); }

    .error-msg {
      margin-top: 0.75rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--accent2);
      display: none;
    }

    /* URLS TABLE */
    .urls-section {
      max-width: 760px;
      margin: 2.5rem auto;
      padding: 0 2rem 4rem;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .section-title {
      font-size: 0.7rem;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
    }

    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.75rem;
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    .url-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .url-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      transition: border-color 0.2s;
    }

    .url-card:hover { border-color: var(--accent); }

    .url-info { flex: 1; min-width: 150px; }

    .url-original {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 380px;
      margin-bottom: 0.3rem;
    }

    .url-short {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 500;
    }

    .url-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .clicks-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.25rem 0.75rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text);
      white-space: nowrap;
    }

    .clicks-badge strong { color: var(--accent2); }

    .delete-btn {
      background: none;
      border: 1px solid transparent;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.75rem;
      padding: 0.35rem 0.6rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .delete-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.85rem;
    }

    .copied-toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--success);
      color: #000;
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.75rem 1.5rem;
      border-radius: 30px;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 100;
      pointer-events: none;
    }

    .copied-toast.show { transform: translateX(-50%) translateY(0); }

    /* ANALYTICS MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 1rem;
    }

    .modal-overlay.show { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      width: 100%;
      max-width: 480px;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .modal-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.25rem;
      cursor: pointer;
      line-height: 1;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.4rem;
    }

    .stat-value {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--accent);
    }

    .chart-label {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.75rem;
    }

    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 80px;
    }

    .bar {
      flex: 1;
      background: var(--accent);
      border-radius: 3px 3px 0 0;
      opacity: 0.8;
      transition: opacity 0.2s;
      min-height: 4px;
    }

    .bar:hover { opacity: 1; }

    @media (max-width: 600px) {
      header { padding: 1rem; }
      .hero { padding: 2rem 1rem 1rem; }
      .urls-section { padding: 0 1rem 3rem; }
      .hero-title { font-size: 2.5rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">snip<span>.</span></div>
  <div class="tagline">// url shortener</div>
</header>

<main class="hero">
  <h1 class="hero-title">Shorten<br><span class="highlight">any link.</span></h1>
  <p class="hero-sub">Paste a long URL, get a snappy short one. Track every click.</p>

  <div class="form-card">
    <div class="input-row">
      <input type="text" class="url-input" id="urlInput" placeholder="https://your-very-long-url.com/goes/here" />
      <button class="shorten-btn" onclick="shortenURL()">Snip it →</button>
    </div>
    <div class="options-row">
      <span class="opt-label">Custom alias:</span>
      <input type="text" class="alias-input" id="aliasInput" placeholder="my-cool-link" />
    </div>

    <p class="error-msg" id="errorMsg"></p>

    <div class="result-box" id="resultBox">
      <a class="result-short" id="resultLink" href="#" target="_blank"></a>
      <div class="result-actions">
        <button class="icon-btn" onclick="copyResult()">copy</button>
        <button class="icon-btn" onclick="openAnalytics(currentShortId)">stats</button>
      </div>
    </div>
  </div>
</main>

<section class="urls-section">
  <div class="section-header">
    <span class="section-title">Recent links</span>
    <button class="refresh-btn" onclick="loadURLs()">↻ refresh</button>
  </div>
  <div class="url-list" id="urlList">
    <div class="empty-state">No links yet. Snip one above!</div>
  </div>
</section>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Link Analytics</span>
      <button class="close-btn" onclick="closeModalDirect()">×</button>
    </div>
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Total Clicks</div>
        <div class="stat-value" id="statClicks">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Created</div>
        <div class="stat-value" style="font-size:1rem;padding-top:0.5rem;" id="statCreated">—</div>
      </div>
    </div>
    <div class="chart-label">Clicks over last 7 days</div>
    <div class="bar-chart" id="barChart"></div>
  </div>
</div>

<div class="copied-toast" id="toast">Copied to clipboard!</div>

<script>
  let currentShortId = ""
  let currentShortURL = ""

  async function shortenURL() {
    const urlInput = document.getElementById("urlInput")
    const aliasInput = document.getElementById("aliasInput")
    const errorMsg = document.getElementById("errorMsg")
    const resultBox = document.getElementById("resultBox")

    const url = urlInput.value.trim()
    const alias = aliasInput.value.trim()

    errorMsg.style.display = "none"
    resultBox.classList.remove("show")

    if (!url) {
      showError("Please enter a URL first.")
      return
    }

    try {
      const body = { url }
      if (alias) body.customAlias = alias

      const res = await fetch("/api/shorten", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      })

      const data = await res.json()

      if (!res.ok) {
        showError(data.error || "Something went wrong.")
        return
      }

      currentShortId = data.id
      currentShortURL = data.shortURL

      const link = document.getElementById("resultLink")
      link.textContent = data.shortURL
      link.href = data.shortURL
      resultBox.classList.add("show")

      urlInput.value = ""
      aliasInput.value = ""

      loadURLs()
    } catch (err) {
      showError("Server error. Is the backend running?")
    }
  }

  function showError(msg) {
    const el = document.getElementById("errorMsg")
    el.textContent = msg
    el.style.display = "block"
  }

  function copyResult() {
    navigator.clipboard.writeText(currentShortURL).then(() => {
      showToast()
    })
  }

  function showToast() {
    const t = document.getElementById("toast")
    t.classList.add("show")
    setTimeout(() => t.classList.remove("show"), 2000)
  }

  async function loadURLs() {
    try {
      const res = await fetch("/api/urls")
      const urls = await res.json()
      renderURLs(urls)
    } catch {
      // silently fail
    }
  }

  function renderURLs(urls) {
    const list = document.getElementById("urlList")
    if (!urls.length) {
      list.innerHTML = '<div class="empty-state">No links yet. Snip one above!</div>'
      return
    }

    list.innerHTML = urls.map(u => {
      const shortURL = `${location.origin}/${u.shortId}`
      const clicks = u.visitHistory ? u.visitHistory.length : 0
      const truncated = u.redirectURL.length > 55 ? u.redirectURL.slice(0, 55) + "…" : u.redirectURL
      return `
        <div class="url-card">
          <div class="url-info">
            <div class="url-original" title="${u.redirectURL}">${truncated}</div>
            <a class="url-short" href="${shortURL}" target="_blank">${shortURL}</a>
          </div>
          <div class="url-meta">
            <span class="clicks-badge"><strong>${clicks}</strong> click${clicks !== 1 ? "s" : ""}</span>
            <button class="icon-btn" onclick="openAnalytics('${u.shortId}')">stats</button>
            <button class="delete-btn" onclick="deleteURL('${u.shortId}', this)">✕</button>
          </div>
        </div>
      `
    }).join("")
  }

  async function deleteURL(shortId, btn) {
    if (!confirm("Delete this short link?")) return
    try {
      await fetch(`/api/urls/${shortId}`, { method: "DELETE" })
      loadURLs()
    } catch {
      alert("Failed to delete.")
    }
  }

  async function openAnalytics(shortId) {
    try {
      const res = await fetch(`/api/analytics/${shortId}`)
      const data = await res.json()

      document.getElementById("statClicks").textContent = data.totalClicks
      document.getElementById("statCreated").textContent = data.createdAt
        ? new Date(data.createdAt).toLocaleDateString("en-IN", { day: "numeric", month: "short" })
        : "—"

      renderBarChart(data.analytics || [])
      document.getElementById("modalOverlay").classList.add("show")
    } catch {
      alert("Could not load analytics.")
    }
  }

  function renderBarChart(history) {
    const chart = document.getElementById("barChart")
    const days = 7
    const buckets = Array(days).fill(0)
    const now = Date.now()
    const dayMs = 86400000

    history.forEach(({ timestamp }) => {
      const diff = now - timestamp
      const dayIndex = Math.floor(diff / dayMs)
      if (dayIndex < days) buckets[days - 1 - dayIndex]++
    })

    const max = Math.max(...buckets, 1)
    chart.innerHTML = buckets.map((val) => {
      const h = Math.max(4, Math.round((val / max) * 80))
      return `<div class="bar" style="height:${h}px" title="${val} clicks"></div>`
    }).join("")
  }

  function closeModal(e) {
    if (e.target === document.getElementById("modalOverlay")) {
      closeModalDirect()
    }
  }

  function closeModalDirect() {
    document.getElementById("modalOverlay").classList.remove("show")
  }

  document.getElementById("urlInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter") shortenURL()
  })

  loadURLs()
</script>
</body>
</html>
